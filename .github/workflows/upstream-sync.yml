name: Upstream Sync

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 UTC 0:00
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # fork リポジトリでは GITHUB_TOKEN で PR を作成できない
          # (Resource not accessible by integration) ため、fine-grained PAT を使う
          token: ${{ secrets.SYNC_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync master with upstream via GitHub API
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          gh api repos/${{ github.repository }}/merge-upstream -f branch=master

      - name: Fetch updated master
        run: |
          git fetch origin master main

      - name: Check for diff between master and main
        id: check_diff
        run: |
          if git diff --quiet origin/master main; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect upstream PR titles from merge commits
        if: steps.check_diff.outputs.has_diff == 'true'
        id: collect_prs
        run: |
          # main..origin/master 間のマージコミットから PR 情報を抽出（API 不要）
          # fork 元 PR への相互参照（mentioned 通知）を残さないよう、リンクは
          # redirect.github.com 経由にする（バックリンクを生成しない公式の方法:
          # docs.github.com の "Avoiding backlinks to linked references"）
          PR_LIST=""
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              # subject から PR 番号を抽出、body から PR タイトルを取得
              PR_NUM=$(echo "$line" | grep -oP '(?<=#)\d+' | head -1)
              PR_TITLE=$(git log --format="%b" -1 "$(echo "$line" | cut -d' ' -f1)")
              if [ -n "$PR_NUM" ] && [ -n "$PR_TITLE" ]; then
                PR_LIST="${PR_LIST}- [#${PR_NUM}](https://redirect.github.com/togatoga/karukan/pull/${PR_NUM}) ${PR_TITLE}"$'\n'
              fi
            fi
          done < <(git log main..origin/master --merges --oneline --grep="Merge pull request")

          # マージコミットが見つからない場合（squash merge 等）のフォールバック
          # subject 中の "(#N)" はそのままだと自リポジトリの PR として誤リンク
          # されるため、redirect.github.com 経由の upstream リンクに変換する
          if [ -z "$PR_LIST" ]; then
            PR_LIST="(マージコミットなし。コミット一覧:)"$'\n'
            while IFS= read -r line; do
              LINKED=$(echo "$line" | sed -E 's|#([0-9]+)|[#\1](https://redirect.github.com/togatoga/karukan/pull/\1)|g')
              PR_LIST="${PR_LIST}- ${LINKED}"$'\n'
            done < <(git log main..origin/master --oneline --no-merges | head -20)
          fi

          # multiline output
          {
            echo "pr_list<<EOF"
            echo "$PR_LIST"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build sync branch
        if: steps.check_diff.outputs.has_diff == 'true'
        run: |
          # master はミラーなので PR の head にせず、main から作り直した
          # 専用ブランチに master をマージして常に main に追従させる
          # （コンフリクト時はここで失敗し、手動解消が必要なことに気づける）
          git checkout -B upstream-sync origin/main
          git merge --no-edit origin/master
          git push -f origin upstream-sync

      - name: Create or update PR
        if: steps.check_diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
          # fork リポジトリでは gh が fork 元 (togatoga/karukan) を PR の対象に
          # 解決してしまうため、自リポジトリに明示的に固定する
          GH_REPO: ${{ github.repository }}
          NEW_ENTRIES: ${{ steps.collect_prs.outputs.pr_list }}
        run: |
          EXISTING_PR=$(gh pr list --base main --head upstream-sync --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$EXISTING_PR" ]; then
            # 新規 PR 作成
            BODY="## Upstream Changes

          upstream (togatoga/karukan) からの変更を main に取り込む PR です。

          ### 含まれる upstream PR

          ${NEW_ENTRIES}"
            gh pr create --base main --head upstream-sync \
              --title "upstream sync: $(date -u +%Y-%m-%d)" \
              --body "$BODY"
          else
            # 既存 PR の body に追記（重複排除）
            CURRENT_BODY=$(gh pr view "$EXISTING_PR" --json body --jq '.body')

            # 既に含まれている PR 番号を除外して新規分のみ追記
            NEW_ONLY=""
            while IFS= read -r entry; do
              if [ -n "$entry" ] && ! echo "$CURRENT_BODY" | grep -qF "$entry"; then
                NEW_ONLY="${NEW_ONLY}${entry}"$'\n'
              fi
            done <<< "$NEW_ENTRIES"

            if [ -n "$NEW_ONLY" ]; then
              UPDATED_BODY="${CURRENT_BODY}

          ---
          **$(date -u +%Y-%m-%d) 追加分:**

          ${NEW_ONLY}"
              gh pr edit "$EXISTING_PR" --body "$UPDATED_BODY" \
                --title "upstream sync: $(date -u +%Y-%m-%d)"
            fi
          fi
